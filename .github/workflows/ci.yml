name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Lint, Build y Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests unitarios
        run: npm test

      - name: Build producción
        run: npm run build -- --configuration production

      - name: Publicar artefacto de build
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy a Vercel
    runs-on: ubuntu-latest
    needs: ci
    # CD solo en merge a main, nunca en PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar secrets de Vercel
        id: vercel_check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        # Skip gracefully si Vercel aún no está configurado — mantiene main verde
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN no está configurado — deploy omitido (ver issue #11)"
          fi

      - name: Instalar Vercel CLI
        if: steps.vercel_check.outputs.available == 'true'
        run: npm install -g vercel@latest

      - name: Deploy a Vercel (producción)
        if: steps.vercel_check.outputs.available == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel --prod --token "$VERCEL_TOKEN" --yes
