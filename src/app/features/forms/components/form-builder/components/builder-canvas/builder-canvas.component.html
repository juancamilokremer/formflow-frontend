<div class="canvas">
  <div class="canvas__scroll">
    @if (form().sections.length === 0) {
      <div class="canvas__empty">
        <span class="canvas__empty-title">{{ 'builder.canvas_empty' | translate }}</span>
        <span class="canvas__empty-sub">{{ 'builder.canvas_empty_subtitle' | translate }}</span>
      </div>
    }

    <div
      cdkDropList
      [cdkDropListData]="form().sections"
      (cdkDropListDropped)="onSectionDrop($event)"
      class="canvas__sections"
    >
      @for (section of form().sections; track section.id) {
        <app-section-card
          cdkDrag
          [cdkDragData]="section"
          [section]="section"
          [selectedQuestionId]="selectedQuestionId()"
          [connectedListIds]="questionListIds()"
          [formType]="formType()"
          (sectionUpdated)="sectionUpdated.emit($event)"
          (sectionDeleted)="sectionDeleted.emit($event)"
          (questionSelected)="questionSelected.emit($event)"
          (questionDeleted)="questionDeleted.emit($event)"
          (questionMoved)="questionMoved.emit($event)"
          (questionChanged)="questionChanged.emit($event)"
        >
          <ng-template cdkDragPlaceholder>
            <div class="canvas__section-placeholder"></div>
          </ng-template>
        </app-section-card>
      }
    </div>

    <button class="canvas__add-section" type="button" (click)="onAddSection()">
      + {{ 'builder.add_section' | translate }}
    </button>
  </div>

  @if (showScoreSummary()) {
    <app-score-summary-bar [form]="form()" />
  }
</div>
