<aside class="sidebar" [class.sidebar--open]="open()">
  <div class="sidebar__header">
    <span class="sidebar__logo">FormFlow</span>
    <button
      class="sidebar__icon-btn sidebar__close"
      type="button"
      (click)="closeRequested.emit()"
      aria-label="Cerrar menú"
    >
      <app-icon name="x" [size]="20" />
    </button>
  </div>

  <nav class="sidebar__nav" aria-label="Navegación principal">
    @for (item of navItems; track item.route) {
      <a
        class="sidebar__nav-item"
        [routerLink]="'/' + item.route"
        routerLinkActive="sidebar__nav-item--active"
        (click)="closeRequested.emit()"
      >
        <app-icon [name]="item.icon" [size]="18" />
        <span>{{ item.labelKey | translate }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__avatar" aria-hidden="true">{{ userInitials }}</div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">{{ userFullName }}</span>
        <span class="sidebar__user-plan">
          {{ 'shell.sidebar.plan_label' | translate: { plan: authService.currentUser()?.tenantPlan } }}
        </span>
      </div>
    </div>
    <button
      class="sidebar__icon-btn sidebar__logout"
      type="button"
      (click)="logout()"
      [attr.aria-label]="'shell.header.logout' | translate"
    >
      <app-icon name="log-out" [size]="18" />
    </button>
  </div>
</aside>
